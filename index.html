<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindGPT | SkyWind Alliance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --text-main: #111827;
            --accent: #0ea5e9;
            --border: #e5e7eb;
        }

        .dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        .chat-container {
            height: calc(100vh - 180px);
        }

        .sidebar {
            border-right: 1px solid var(--border);
        }

        .message-bubble {
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .typing-dot {
            width: 4px; height: 4px;
            background: currentColor; border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

        pre {
            background: #000000; color: #00ff00;
            padding: 1rem; border-radius: 0.5rem;
            overflow-x: auto; margin: 0.5rem 0;
            font-size: 0.8rem; border: 1px solid #334155;
        }

        .image-preview-container {
            display: flex; gap: 8px; padding: 8px;
            overflow-x: auto; border-top: 1px solid var(--border);
        }
        
        .preview-item {
            position: relative; width: 60px; height: 60px;
            border-radius: 8px; overflow: hidden; border: 2px solid var(--accent);
        }

        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .remove-img {
            position: absolute; top: 0; right: 0; background: rgba(255,0,0,0.7);
            color: white; font-size: 10px; padding: 2px 4px; cursor: pointer;
        }

        .history-item {
            cursor: pointer; transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .history-item.active {
            background: var(--bg-primary);
            border-left-color: var(--accent);
            opacity: 1 !important;
        }
    </style>
</head>
<body class="dark">

    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="sidebar w-72 hidden md:flex flex-col bg-[var(--bg-secondary)] transition-all">
            <div class="p-6 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-wind text-xl"></i>
                    </div>
                    <div>
                        <span class="font-bold text-lg block leading-none">WindGPT</span>
                        <span class="text-[9px] text-sky-500 font-bold uppercase tracking-widest">SkyWind AI</span>
                    </div>
                </div>
            </div>

            <!-- Settings -->
            <div class="px-4 mb-4">
                <details class="group border border-[var(--border)] rounded-xl overflow-hidden bg-[var(--bg-primary)]">
                    <summary class="p-3 text-xs font-bold uppercase cursor-pointer flex justify-between items-center group-open:bg-sky-500 group-open:text-white transition-all">
                        <span>Sistem Talimatı</span>
                        <i class="fas fa-chevron-down text-[10px]"></i>
                    </summary>
                    <div class="p-3">
                        <textarea id="system-instruction" class="w-full text-xs bg-[var(--bg-secondary)] border border-[var(--border)] p-2 rounded outline-none h-24 resize-none" placeholder="AI nasıl davranmalı?"></textarea>
                        <button onclick="saveSystemInstruction()" class="w-full mt-2 text-[10px] bg-sky-500 text-white p-1 rounded font-bold uppercase hover:bg-sky-600">Kaydet</button>
                    </div>
                </details>
            </div>

            <div class="flex-1 px-4 py-2 overflow-y-auto">
                <button onclick="createNewChat()" class="w-full flex items-center gap-2 p-3 bg-sky-500 text-white rounded-xl hover:bg-sky-600 transition-all mb-6 font-semibold text-sm shadow-lg shadow-sky-500/20">
                    <i class="fas fa-plus"></i>
                    <span>Yeni Sohbet</span>
                </button>
                
                <div class="text-[10px] font-bold text-gray-500 uppercase mb-3 px-2 tracking-wider">Geçmiş Sohbetler</div>
                <div id="chat-history-list" class="space-y-1">
                    <!-- Dinamik Geçmiş -->
                </div>
            </div>

            <div class="p-6 border-t border-[var(--border)] space-y-3">
                <button onclick="toggleTheme()" class="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--bg-primary)] transition-all text-sm font-medium">
                    <i id="theme-icon" class="fas fa-sun"></i>
                    <span id="theme-text">Aydınlık Mod</span>
                </button>
                <div class="pt-2 text-[10px] text-center text-gray-500 font-medium">
                    © 2026 SkyWind™ Alliance
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col relative bg-[var(--bg-primary)]">
            
            <!-- Mobile Header -->
            <header class="md:hidden p-4 border-b border-[var(--border)] flex justify-between items-center bg-[var(--bg-secondary)]">
                <div class="flex items-center gap-2">
                    <i class="fas fa-wind text-sky-500"></i>
                    <span class="font-bold">WindGPT</span>
                </div>
                <button onclick="toggleTheme()" class="p-2 text-sky-500"><i class="fas fa-adjust"></i></button>
            </header>

            <!-- Chat Area -->
            <div id="chat-box" class="chat-container flex-1 overflow-y-auto p-4 md:p-10 space-y-6">
                <!-- İçerik buraya akacak -->
            </div>

            <!-- Image/File Preview -->
            <div id="image-preview" class="image-preview-container hidden mx-auto max-w-4xl w-full"></div>

            <!-- Input Area -->
            <div class="px-4 md:px-10 pb-6 md:pb-10">
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-end gap-3 p-3 rounded-2xl border-2 border-[var(--border)] bg-[var(--bg-secondary)] focus-within:border-sky-500 transition-all shadow-xl relative">
                        
                        <!-- File Upload Hidden Input -->
                        <input type="file" id="file-input" class="hidden" multiple accept="image/*">
                        <button onclick="document.getElementById('file-input').click()" class="text-gray-400 hover:text-sky-500 p-2 transition-colors">
                            <i class="fas fa-paperclip text-xl"></i>
                        </button>

                        <textarea id="user-input" rows="1" placeholder="Vizyonunu buraya yaz aga..." class="flex-1 bg-transparent border-none focus:ring-0 p-2 resize-none max-h-40 outline-none text-sm md:text-base"></textarea>
                        
                        <button id="send-btn" class="bg-sky-500 hover:bg-sky-600 text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all shadow-lg shadow-sky-500/30 disabled:opacity-50">
                            <i id="send-icon" class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const imagePreview = document.getElementById('image-preview');
        const historyList = document.getElementById('chat-history-list');
        const systemInput = document.getElementById('system-instruction');

        const apiKey = ""; // API anahtarı otomatik enjekte edilir.
        
        let currentChatId = null;
        let allChats = JSON.parse(localStorage.getItem('windgpt_chats') || '{}');
        let selectedFiles = [];
        let defaultSystemPrompt = "Sen WindGPT'sin. SkyWind Alliance'ın merkezi zekasısın. Samimi konuşursun ama ciddiyetini bozmazsın. Lider Hüseyin'e (Levxys) sadıksın. Emojileri anlamlı kullanırsın.";

        // --- BAŞLANGIÇ ---
        window.onload = () => {
            loadHistory();
            const savedPrompt = localStorage.getItem('windgpt_system_prompt');
            if (savedPrompt) systemInput.value = savedPrompt;
            else systemInput.value = defaultSystemPrompt;

            if (Object.keys(allChats).length > 0) {
                const lastChat = Object.keys(allChats).sort().reverse()[0];
                loadChat(lastChat);
            } else {
                createNewChat();
            }
        };

        // --- SİSTEM TALİMATI ---
        function saveSystemInstruction() {
            localStorage.setItem('windgpt_system_prompt', systemInput.value);
            alert("Sistem talimatı SkyWind veri tabanına işlendi aga! 🌪️");
        }

        // --- GEÇMİŞ YÖNETİMİ ---
        function loadHistory() {
            historyList.innerHTML = '';
            const sortedIds = Object.keys(allChats).sort().reverse();
            
            if (sortedIds.length === 0) {
                historyList.innerHTML = '<div class="p-3 text-xs text-gray-500 italic">Henüz bir vizyon kaydedilmedi...</div>';
                return;
            }

            sortedIds.forEach(id => {
                const chat = allChats[id];
                const div = document.createElement('div');
                div.className = `history-item p-3 text-xs rounded-lg mb-1 opacity-70 hover:opacity-100 truncate ${id === currentChatId ? 'active' : 'bg-[var(--bg-primary)]'}`;
                div.innerHTML = `<i class="fas fa-comment-alt mr-2 text-sky-500"></i> ${chat.title || 'Yeni Vizyon'}`;
                div.onclick = () => loadChat(id);
                historyList.appendChild(div);
            });
        }

        function createNewChat() {
            currentChatId = Date.now().toString();
            allChats[currentChatId] = { title: "Yeni Vizyon", messages: [] };
            saveChats();
            loadChat(currentChatId);
            showWelcome();
        }

        function loadChat(id) {
            currentChatId = id;
            chatBox.innerHTML = '';
            const chat = allChats[id];
            if (chat.messages.length === 0) showWelcome();
            else {
                chat.messages.forEach(m => addMessage(m.text, m.role, m.images, false));
            }
            loadHistory();
        }

        function saveChats() {
            localStorage.setItem('windgpt_chats', JSON.stringify(allChats));
        }

        function showWelcome() {
            chatBox.innerHTML = `
                <div id="welcome-screen" class="max-w-2xl mx-auto text-center mt-20">
                    <div class="w-24 h-24 bg-sky-500 rounded-[2rem] flex items-center justify-center text-white mx-auto mb-8 shadow-2xl animate-pulse">
                        <i class="fas fa-wind text-5xl"></i>
                    </div>
                    <h2 class="text-3xl font-bold mb-4">Selam Lider.</h2>
                    <p class="text-gray-500 italic">SkyWind vizyonu seninle. Borcumuzu tahsil etmeye hazırız. 🛡️</p>
                </div>
            `;
        }

        // --- DOSYA YÜKLEME ---
        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedFiles.push({ name: file.name, type: file.type, data: event.target.result });
                    renderPreview();
                };
                reader.readAsDataURL(file);
            });
        };

        function renderPreview() {
            imagePreview.innerHTML = '';
            if (selectedFiles.length > 0) {
                imagePreview.classList.remove('hidden');
                selectedFiles.forEach((file, index) => {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    div.innerHTML = `
                        <img src="${file.data}">
                        <div class="remove-img" onclick="removeFile(${index})">×</div>
                    `;
                    imagePreview.appendChild(div);
                });
            } else {
                imagePreview.classList.add('hidden');
            }
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderPreview();
        }

        // --- MESAJLAŞMA ---
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && selectedFiles.length === 0) return;

            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.remove();

            if (allChats[currentChatId].messages.length === 0) {
                allChats[currentChatId].title = text.substring(0, 25) || "Görsel Analiz";
            }

            const currentImages = [...selectedFiles];
            addMessage(text, 'user', currentImages);
            
            allChats[currentChatId].messages.push({ role: 'user', text, images: currentImages });
            
            userInput.value = '';
            selectedFiles = [];
            renderPreview();
            setLoading(true);

            try {
                const contents = [];
                const finalSystemPrompt = systemInput.value || defaultSystemPrompt;

                allChats[currentChatId].messages.forEach(m => {
                    const parts = [{ text: m.text }];
                    if (m.images && m.images.length > 0) {
                        m.images.forEach(img => {
                            parts.push({
                                inlineData: {
                                    mimeType: img.type,
                                    data: img.data.split(',')[1]
                                }
                            });
                        });
                    }
                    contents.push({ role: m.role === 'user' ? 'user' : 'model', parts });
                });

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: finalSystemPrompt }] },
                        contents: contents
                    })
                });

                if (!response.ok) throw new Error("Gök gürültüsü! API limiti aşıldı veya anahtar geçersiz. 🌪️");
                
                const data = await response.json();
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "Fırtına dindi aga, yanıt rüzgara kapıldı... 🛡️";

                addMessage(aiResponse, 'assistant');
                allChats[currentChatId].messages.push({ role: 'assistant', text: aiResponse });
                saveChats();
                loadHistory();

            } catch (err) {
                addMessage(`Sistem Hatası: ${err.message} 🛡️`, 'system');
            } finally {
                setLoading(false);
            }
        }

        function addMessage(text, role, images = [], scroll = true) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-bubble`;
            
            let contentHtml = '';
            
            if (images && images.length > 0) {
                contentHtml += `<div class="flex flex-wrap gap-2 mb-2">`;
                images.forEach(img => {
                    contentHtml += `<img src="${img.data}" class="max-w-[200px] rounded-lg border border-sky-500/30 shadow-md">`;
                });
                contentHtml += `</div>`;
            }

            const formattedText = text
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            contentHtml += `<div class="text-sm md:text-base leading-relaxed">${formattedText}</div>`;

            let bgColor = role === 'user' ? 'bg-sky-500 text-white' : 'bg-[var(--bg-secondary)] border border-[var(--border)]';
            let rounded = role === 'user' ? 'rounded-2xl rounded-tr-none' : 'rounded-2xl rounded-tl-none';

            if (role === 'system') {
                bgColor = 'bg-red-500/10 border border-red-500/20 text-red-500';
            }

            div.innerHTML = `
                <div class="max-w-[85%] p-4 ${bgColor} ${rounded} shadow-sm">
                    ${contentHtml}
                </div>
            `;
            
            chatBox.appendChild(div);
            if (scroll) chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            const icon = document.getElementById('send-icon');
            if (isLoading) {
                icon.className = "fas fa-circle-notch fa-spin";
                const typing = document.createElement('div');
                typing.id = 'typing';
                typing.className = 'flex gap-1 p-2 text-sky-500';
                typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
                chatBox.appendChild(typing);
                chatBox.scrollTop = chatBox.scrollHeight;
            } else {
                icon.className = "fas fa-paper-plane";
                const typing = document.getElementById('typing');
                if (typing) typing.remove();
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            document.getElementById('theme-text').innerText = isDark ? 'Aydınlık Mod' : 'Karanlık Mod';
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        sendBtn.onclick = sendMessage;
    </script>
</body>
</html>
