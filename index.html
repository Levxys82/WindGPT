<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindGPT | SkyWind Alliance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        :root { --bg-primary: #ffffff; --bg-secondary: #f9fafb; --text-main: #111827; --accent: #0ea5e9; --border: #e5e7eb; }
        .dark { --bg-primary: #0f172a; --bg-secondary: #1e293b; --text-main: #f8fafc; --accent: #38bdf8; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-primary); color: var(--text-main); transition: background-color 0.3s; overflow: hidden; margin: 0; }
        .chat-container { height: calc(100vh - 160px); }
        .message-bubble { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        pre { background: #011627; color: #d6deeb; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin: 0.5rem 0; position: relative; font-size: 0.85rem; }
        .typing-cursor { display: inline-block; width: 8px; height: 18px; background: var(--accent); margin-left: 4px; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
        .image-gen-placeholder { width: 100%; max-width: 512px; aspect-ratio: 1; background: var(--bg-secondary); border: 2px dashed var(--border); border-radius: 1rem; display: flex; items-center; justify-center; flex-direction: column; gap: 1rem; }
    </style>
</head>
<body class="dark">

    <!-- Ayarlar Modalı -->
    <div id="instruction-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
        <div class="bg-[var(--bg-secondary)] w-full max-w-lg rounded-2xl border border-[var(--border)] shadow-2xl p-6">
            <h3 class="font-bold text-lg text-sky-500 mb-4">Merkezi Zeka Yapılandırması 🌪️</h3>
            <textarea id="system-instruction" class="w-full h-48 bg-[var(--bg-primary)] border border-[var(--border)] p-4 rounded-xl outline-none text-sm resize-none focus:border-sky-500"></textarea>
            <div class="mt-6 flex gap-3">
                <button onclick="toggleModal('instruction-modal')" class="flex-1 py-3 rounded-xl border border-[var(--border)] text-sm">İptal</button>
                <button onclick="saveSystemInstruction()" class="flex-1 py-3 rounded-xl bg-sky-500 text-white text-sm font-bold">Kaydet</button>
            </div>
        </div>
    </div>

    <div class="flex h-screen">
        <!-- Kenar Çubuğu -->
        <aside class="w-80 hidden md:flex flex-col bg-[var(--bg-secondary)] border-r border-[var(--border)]">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-wind"></i></div>
                <div><span class="font-bold text-lg block">WindGPT</span><span class="text-[9px] text-sky-500 font-bold uppercase tracking-widest">SkyWind AI</span></div>
            </div>
            
            <div class="flex-1 px-4 overflow-y-auto">
                <button onclick="createNewChat()" class="w-full flex items-center gap-2 p-3 bg-sky-500 text-white rounded-xl mb-6 font-semibold text-sm shadow-lg hover:bg-sky-600 transition-all">
                    <i class="fas fa-plus text-xs"></i><span>Yeni Vizyon</span>
                </button>
                <div id="chat-history-list" class="space-y-2"></div>
            </div>

            <div class="p-6 border-t border-[var(--border)] space-y-3">
                <button onclick="toggleTheme()" class="w-full p-3 rounded-xl border border-[var(--border)] text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-2">
                    <i id="theme-icon" class="fas fa-sun"></i><span id="theme-text">Aydınlık Mod</span>
                </button>
                <div class="text-[9px] text-center text-gray-500">© 2026 SkyWind™ Alliance 🛡️</div>
            </div>
        </aside>

        <!-- Ana Panel -->
        <main class="flex-1 flex flex-col bg-[var(--bg-primary)]">
            <header class="p-4 border-b border-[var(--border)] flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <button class="md:hidden text-gray-500"><i class="fas fa-bars"></i></button>
                    <span id="current-chat-title" class="font-bold text-xs text-gray-500 uppercase tracking-widest truncate max-w-[200px]">Yükleniyor...</span>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="generateImagePrompt()" class="p-2 text-sky-500 hover:bg-sky-500/10 rounded-lg transition-colors" title="Görsel Üret"><i class="fas fa-paint-brush"></i></button>
                    <button onclick="toggleModal('instruction-modal')" class="p-2 text-gray-400 hover:text-sky-500 rounded-lg transition-colors"><i class="fas fa-cog text-lg"></i></button>
                </div>
            </header>

            <div id="chat-box" class="chat-container flex-1 overflow-y-auto p-4 md:p-10 space-y-8"></div>

            <!-- Input Alanı -->
            <div class="p-4 md:p-8 pt-0">
                <div class="max-w-4xl mx-auto relative">
                    <div id="image-preview-container" class="hidden flex gap-2 p-3 border-x border-t border-[var(--border)] bg-[var(--bg-secondary)] rounded-t-2xl"></div>
                    <div class="flex items-end gap-3 p-2 rounded-2xl border border-[var(--border)] bg-[var(--bg-secondary)] shadow-2xl focus-within:border-sky-500 transition-all">
                        <input type="file" id="file-input" class="hidden" multiple accept="image/*">
                        <button onclick="document.getElementById('file-input').click()" class="text-gray-400 hover:text-sky-500 p-3"><i class="fas fa-camera text-xl"></i></button>
                        <textarea id="user-input" rows="1" placeholder="Vizyonunu yaz veya /imagine ile hayal et Lider..." class="flex-1 bg-transparent border-none focus:ring-0 p-3 resize-none outline-none text-sm min-h-[48px]"></textarea>
                        <button id="send-btn" class="bg-sky-500 text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-transform"><i id="send-icon" class="fas fa-arrow-up text-lg"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        const apiKey = ""; 
        const DEFAULT_SYSTEM = "Sen WindGPT'sin. SkyWind Alliance'ın merkezi zekasısın. Lider Hüseyin'e (Levxys) sadıksın. Samimi konuşursun. © 2026 SkyWind™ Alliance değerlerine bağlısın.";
        
        let currentChatId = null;
        let allChats = JSON.parse(localStorage.getItem('windgpt_v3_chats') || '{}');
        let selectedFiles = [];
        let isTyping = false;

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const historyList = document.getElementById('chat-history-list');

        // --- API Yardımcıları ---
        async function fetchGemini(endpoint, payload, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${endpoint}:generateContent?key=${apiKey}`;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify(payload) 
                    });
                    
                    if (response.status === 403) {
                        throw new Error("HTTP 403: Erişim Reddedildi. API anahtarı geçersiz veya yetkisiz.");
                    }
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    if (data?.candidates?.[0]) return data;
                    throw new Error("Yanıt alınamadı");
                } catch (err) {
                    if (i === retries - 1 || err.message.includes("403")) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        // --- Görsel Üretimi (Imagen) ---
        async function generateImage(prompt) {
            const tempId = displayLoadingMessage("Görseliniz SkyWind bulutlarında işleniyor... 🎨");
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: [{ prompt: prompt }], parameters: { sampleCount: 1 } })
                });

                if (response.status === 403) {
                    throw new Error("Görsel üretimi için yetkiniz yok (HTTP 403).");
                }

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const b64 = data.predictions[0].bytesBase64Encoded;
                removeLoadingMessage(tempId);
                displayImageResult(`data:image/png;base64,${b64}`, prompt);
                allChats[currentChatId].messages.push({ role: 'assistant', text: `[Görsel üretildi: ${prompt}]`, generatedImage: b64 });
                save();
            } catch (err) {
                removeLoadingMessage(tempId);
                displayMessage("Sinyal kesildi Lider: " + err.message, 'system');
            }
        }

        // --- UI Fonksiyonları ---
        window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');
        window.saveSystemInstruction = () => { localStorage.setItem('windgpt_v3_system', document.getElementById('system-instruction').value); toggleModal('instruction-modal'); };
        
        window.createNewChat = () => {
            const id = Date.now().toString();
            allChats[id] = { title: "Yeni Vizyon", messages: [] };
            save();
            switchChat(id);
        };

        window.deleteChat = (id, event) => {
            event.stopPropagation();
            delete allChats[id];
            save();
            if (currentChatId === id) {
                const keys = Object.keys(allChats);
                if (keys.length > 0) switchChat(keys[0]);
                else createNewChat();
            } else renderHistory();
        };

        window.renameChat = (id, event) => {
            event.stopPropagation();
            const newTitle = prompt("Yeni başlık:", allChats[id].title);
            if (newTitle) {
                allChats[id].title = newTitle;
                save();
                renderHistory();
                if (id === currentChatId) document.getElementById('current-chat-title').innerText = newTitle;
            }
        };

        function switchChat(id) {
            currentChatId = id;
            chatBox.innerHTML = '';
            const chat = allChats[id];
            document.getElementById('current-chat-title').innerText = chat.title;
            chat.messages.forEach(m => {
                if (m.generatedImage) displayImageResult(`data:image/png;base64,${m.generatedImage}`, m.text);
                else displayMessage(m.text, m.role, m.images);
            });
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = '';
            Object.keys(allChats).sort((a,b) => b-a).forEach(id => {
                const active = id === currentChatId;
                const item = document.createElement('div');
                item.className = `group p-3 rounded-xl cursor-pointer text-xs font-semibold flex items-center justify-between transition-all ${active ? 'bg-sky-500 text-white shadow-md' : 'text-gray-400 hover:bg-white/5'}`;
                item.innerHTML = `
                    <div class="flex items-center gap-2 truncate" onclick="switchChat('${id}')">
                        <i class="fas fa-comment-alt opacity-50"></i>
                        <span class="truncate">${allChats[id].title}</span>
                    </div>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="renameChat('${id}', event)" class="p-1 hover:text-sky-300"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteChat('${id}', event)" class="p-1 hover:text-red-400"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                item.onclick = () => switchChat(id);
                historyList.appendChild(item);
            });
        }

        async function handleSend() {
            if (isTyping) return;
            const text = userInput.value.trim();
            if (!text && selectedFiles.length === 0) return;

            if (text.startsWith('/imagine ')) {
                const prompt = text.replace('/imagine ', '');
                displayMessage(text, 'user');
                userInput.value = '';
                generateImage(prompt);
                return;
            }

            const images = [...selectedFiles];
            displayMessage(text, 'user', images);
            allChats[currentChatId].messages.push({ role: 'user', text, images });
            
            userInput.value = '';
            selectedFiles = [];
            document.getElementById('image-preview-container').classList.add('hidden');
            setLoading(true);

            try {
                const system = localStorage.getItem('windgpt_v3_system') || DEFAULT_SYSTEM;
                const contents = allChats[currentChatId].messages.map(m => ({
                    role: m.role === 'user' ? 'user' : 'model',
                    parts: [{ text: m.text || "Analiz et." }, ...(m.images || []).map(img => ({ inlineData: { mimeType: "image/png", data: img.data.split(',')[1] } }))]
                }));

                const data = await fetchGemini('gemini-2.5-flash-preview-09-2025', { systemInstruction: { parts: [{ text: system }] }, contents });
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                setLoading(false);
                await displayMessage(aiResponse, 'assistant', [], true);
                allChats[currentChatId].messages.push({ role: 'assistant', text: aiResponse });
                
                if (allChats[currentChatId].messages.length <= 2) autoRename(text);
                save();
            } catch (err) {
                setLoading(false);
                displayMessage("Sinyal kesildi Lider: " + err.message, 'system');
            }
        }

        async function autoRename(u) {
            try {
                const data = await fetchGemini('gemini-2.5-flash-preview-09-2025', { contents: [{ parts: [{ text: `Aşağıdaki mesajı 2-3 kelimeyle özetle. Sadece özeti ver: ${u}` }] }] });
                const title = data.candidates[0].content.parts[0].text.replace(/[".]/g, '');
                allChats[currentChatId].title = title;
                save();
                renderHistory();
                document.getElementById('current-chat-title').innerText = title;
            } catch(e) {}
        }

        function displayMessage(text, role, images = [], animate = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-bubble`;
            const box = document.createElement('div');
            box.className = `max-w-[85%] p-4 rounded-2xl ${role === 'user' ? 'bg-sky-500 text-white shadow-xl rounded-tr-none' : 'bg-[var(--bg-secondary)] border border-[var(--border)] shadow-md rounded-tl-none'}`;
            
            if (images.length > 0) {
                const imgGrid = document.createElement('div');
                imgGrid.className = "flex gap-2 mb-3 flex-wrap";
                images.forEach(img => imgGrid.innerHTML += `<img src="${img.data}" class="w-32 h-32 object-cover rounded-xl border border-white/10 shadow-sm">`);
                box.appendChild(imgGrid);
            }

            const textEl = document.createElement('div');
            textEl.className = "text-sm leading-relaxed";
            box.appendChild(textEl);
            wrapper.appendChild(box);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;

            if (role === 'system') {
                box.className = "max-w-[85%] p-3 rounded-xl bg-red-500/10 border border-red-500/50 text-red-500 text-xs font-bold";
            }

            if (animate) {
                return new Promise(resolve => {
                    isTyping = true;
                    const words = text.split(' ');
                    let current = '';
                    let i = 0;
                    const interval = setInterval(() => {
                        if (i < words.length) {
                            current += words[i++] + ' ';
                            textEl.innerHTML = parseMD(current) + '<span class="typing-cursor"></span>';
                            chatBox.scrollTop = chatBox.scrollHeight;
                        } else {
                            clearInterval(interval);
                            textEl.innerHTML = parseMD(text);
                            isTyping = false;
                            resolve();
                        }
                    }, 40);
                });
            } else {
                textEl.innerHTML = parseMD(text);
            }
        }

        function displayImageResult(src, prompt) {
            const wrapper = document.createElement('div');
            wrapper.className = "flex justify-start message-bubble";
            wrapper.innerHTML = `
                <div class="bg-[var(--bg-secondary)] border border-[var(--border)] p-2 rounded-2xl shadow-xl max-w-lg">
                    <img src="${src}" class="w-full h-auto rounded-xl mb-2 cursor-pointer hover:opacity-90" onclick="window.open('${src}')">
                    <div class="p-2 text-[10px] text-gray-500 font-bold uppercase tracking-widest"><i class="fas fa-magic mr-2"></i>${prompt}</div>
                </div>
            `;
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function displayLoadingMessage(msg) {
            const id = 'loading-' + Date.now();
            const wrapper = document.createElement('div');
            wrapper.id = id;
            wrapper.className = "flex justify-start message-bubble";
            wrapper.innerHTML = `
                <div class="bg-[var(--bg-secondary)] border border-[var(--border)] p-4 rounded-2xl flex items-center gap-4">
                    <div class="w-5 h-5 border-2 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-xs font-bold text-sky-500">${msg}</span>
                </div>
            `;
            chatBox.appendChild(wrapper);
            return id;
        }

        function removeLoadingMessage(id) { document.getElementById(id)?.remove(); }

        function parseMD(t) {
            return t.replace(/```(\w+)?([\s\S]*?)```/g, '<pre class="my-4"><code class="text-xs">$2</code></pre>').replace(/\n/g, '<br>');
        }

        function setLoading(l) {
            sendBtn.disabled = l;
            document.getElementById('send-icon').className = l ? "fas fa-spinner fa-spin" : "fas fa-arrow-up";
        }

        function save() { localStorage.setItem('windgpt_v3_chats', JSON.stringify(allChats)); }

        window.toggleTheme = () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            document.getElementById('theme-text').innerText = isDark ? 'Aydınlık Mod' : 'Karanlık Mod';
        };

        window.generateImagePrompt = () => { userInput.value = '/imagine '; userInput.focus(); };

        sendBtn.onclick = handleSend;
        userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
        
        document.getElementById('file-input').onchange = (e) => {
            const container = document.getElementById('image-preview-container');
            container.classList.remove('hidden');
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedFiles.push({ data: ev.target.result, name: file.name });
                    container.innerHTML += `<div class="relative"><img src="${ev.target.result}" class="w-16 h-16 object-cover rounded-lg border border-sky-500/50"></div>`;
                };
                reader.readAsDataURL(file);
            });
        };

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('system-instruction').value = localStorage.getItem('windgpt_v3_system') || DEFAULT_SYSTEM;
            if (Object.keys(allChats).length === 0) createNewChat();
            else switchChat(Object.keys(allChats).sort((a,b)=>b-a)[0]);
        });
    </script>
</body>
</html>
