<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindGPT | SkyWind Alliance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --text-main: #111827;
            --accent: #0ea5e9;
            --border: #e5e7eb;
        }

        .dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
        }

        .chat-container {
            height: calc(100vh - 180px);
        }

        .sidebar {
            border-right: 1px solid var(--border);
        }

        .message-bubble {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .typing-dot {
            width: 4px; height: 4px;
            background: currentColor; border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

        pre {
            background: #011627; color: #d6deeb;
            padding: 1rem; border-radius: 0.75rem;
            overflow-x: auto; margin: 0.5rem 0;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem; border: 1px solid #1d3b53;
            position: relative;
        }

        .code-lang {
            position: absolute; top: 0; right: 0;
            padding: 2px 8px; font-size: 10px;
            background: #1d3b53; color: #7fdbca;
            border-bottom-left-radius: 4px;
        }

        .image-preview-container {
            display: flex; gap: 8px; padding: 8px;
            overflow-x: auto; border-top: 1px solid var(--border);
        }
        
        .preview-item {
            position: relative; width: 60px; height: 60px;
            border-radius: 8px; overflow: hidden; border: 2px solid var(--accent);
        }

        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .remove-img {
            position: absolute; top: 0; right: 0; background: rgba(255,0,0,0.7);
            color: white; font-size: 10px; padding: 2px 4px; cursor: pointer;
        }

        .history-item {
            cursor: pointer; transition: all 0.2s;
            border-left: 3px solid transparent;
            position: relative;
            group: hover;
        }
        .history-item.active {
            background: var(--bg-primary);
            border-left-color: var(--accent);
            opacity: 1 !important;
        }

        .modal {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid var(--accent);
            width: 24px; height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="dark">

    <!-- Modal: Sistem Talimatı -->
    <div id="instruction-modal" class="modal fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-[var(--bg-secondary)] w-full max-w-lg rounded-2xl border border-[var(--border)] shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-[var(--border)] flex justify-between items-center">
                <h3 class="font-bold text-lg text-sky-500">Merkezi Zeka Yapılandırması</h3>
                <button onclick="toggleModal('instruction-modal')" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6">
                <p class="text-xs text-gray-500 mb-3 uppercase font-bold">Zekanın Çalışma Prensipleri</p>
                <textarea id="system-instruction" class="w-full h-48 bg-[var(--bg-primary)] border border-[var(--border)] p-4 rounded-xl outline-none text-sm resize-none focus:border-sky-500 transition-all"></textarea>
                <div class="mt-6 flex gap-3">
                    <button onclick="toggleModal('instruction-modal')" class="flex-1 py-3 rounded-xl border border-[var(--border)] text-sm font-semibold hover:bg-gray-800">İptal</button>
                    <button onclick="saveSystemInstruction()" class="flex-1 py-3 rounded-xl bg-sky-500 text-white text-sm font-semibold hover:bg-sky-600 shadow-lg shadow-sky-500/20">Kaydet ve Senkronize Et</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: İsim Değiştir -->
    <div id="rename-modal" class="modal fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-[var(--bg-secondary)] w-full max-w-sm rounded-2xl border border-[var(--border)] shadow-2xl p-6 text-center">
            <h3 class="font-bold mb-4">Vizyon İsmini Güncelle</h3>
            <input type="text" id="new-chat-name" class="w-full bg-[var(--bg-primary)] border border-[var(--border)] p-3 rounded-xl outline-none mb-6 text-center">
            <div class="flex gap-2">
                <button onclick="toggleModal('rename-modal')" class="flex-1 py-2 text-sm text-gray-500">Vazgeç</button>
                <button onclick="confirmRename()" class="flex-1 py-2 bg-sky-500 text-white rounded-lg text-sm font-bold">Kaydet</button>
            </div>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="sidebar w-80 hidden md:flex flex-col bg-[var(--bg-secondary)] transition-all">
            <div class="p-6 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-wind text-xl"></i>
                    </div>
                    <div>
                        <span class="font-bold text-lg block leading-none">WindGPT</span>
                        <span class="text-[9px] text-sky-500 font-bold uppercase tracking-widest">SkyWind AI</span>
                    </div>
                </div>
            </div>

            <div class="px-4 mb-4">
                <button onclick="toggleModal('instruction-modal')" class="w-full flex items-center justify-between p-3 rounded-xl bg-sky-500/10 border border-sky-500/20 text-sky-500 hover:bg-sky-500/20 transition-all">
                    <span class="text-xs font-bold uppercase">Sistem Talimatı</span>
                    <i class="fas fa-cog"></i>
                </button>
            </div>

            <div class="flex-1 px-4 py-2 overflow-y-auto">
                <button onclick="createNewChat()" class="w-full flex items-center gap-2 p-3 bg-sky-500 text-white rounded-xl hover:bg-sky-600 transition-all mb-6 font-semibold text-sm shadow-lg shadow-sky-500/20">
                    <i class="fas fa-plus"></i>
                    <span>Yeni Vizyon Başlat</span>
                </button>
                
                <div class="text-[10px] font-bold text-gray-500 uppercase mb-3 px-2 tracking-wider">Vizyon Arşivi</div>
                <div id="chat-history-list" class="space-y-1"></div>
            </div>

            <div class="p-6 border-t border-[var(--border)] space-y-3">
                <button onclick="toggleTheme()" class="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-[var(--bg-primary)] transition-all text-sm font-medium">
                    <i id="theme-icon" class="fas fa-sun"></i>
                    <span id="theme-text">Aydınlık Mod</span>
                </button>
                <div class="pt-2 text-[10px] text-center text-gray-500 font-medium">
                    © 2026 SkyWind™ Alliance
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col relative bg-[var(--bg-primary)]">
            
            <!-- Mobile Header -->
            <header class="md:hidden p-4 border-b border-[var(--border)] flex justify-between items-center bg-[var(--bg-secondary)]">
                <div class="flex items-center gap-2">
                    <i class="fas fa-wind text-sky-500"></i>
                    <span class="font-bold">WindGPT</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleModal('instruction-modal')" class="p-2 text-sky-500"><i class="fas fa-cog"></i></button>
                    <button onclick="toggleTheme()" class="p-2 text-sky-500"><i class="fas fa-adjust"></i></button>
                </div>
            </header>

            <!-- Chat Area -->
            <div id="chat-box" class="chat-container flex-1 overflow-y-auto p-4 md:p-10 space-y-8"></div>

            <!-- Image/File Preview -->
            <div id="image-preview" class="image-preview-container hidden mx-auto max-w-4xl w-full"></div>

            <!-- Input Area -->
            <div class="px-4 md:px-10 pb-6 md:pb-10">
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-end gap-3 p-3 rounded-2xl border-2 border-[var(--border)] bg-[var(--bg-secondary)] focus-within:border-sky-500 transition-all shadow-xl relative">
                        
                        <input type="file" id="file-input" class="hidden" multiple accept="image/*">
                        <button onclick="document.getElementById('file-input').click()" class="text-gray-400 hover:text-sky-500 p-2 transition-colors" title="Görsel Yükle">
                            <i class="fas fa-paperclip text-xl"></i>
                        </button>

                        <textarea id="user-input" rows="1" placeholder="Vizyonunu buraya yaz aga..." class="flex-1 bg-transparent border-none focus:ring-0 p-2 resize-none max-h-40 outline-none text-sm md:text-base"></textarea>
                        
                        <div class="flex gap-2">
                            <button onclick="generateImageFromPrompt()" id="imagine-btn" class="bg-purple-500/10 text-purple-500 hover:bg-purple-500 hover:text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all border border-purple-500/20" title="Görsel Oluştur (Imagine)">
                                <i class="fas fa-wand-magic-sparkles"></i>
                            </button>
                            <button id="send-btn" class="bg-sky-500 hover:bg-sky-600 text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all shadow-lg shadow-sky-500/30 disabled:opacity-50">
                                <i id="send-icon" class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const imagePreview = document.getElementById('image-preview');
        const historyList = document.getElementById('chat-history-list');
        const systemInput = document.getElementById('system-instruction');
        const renameInput = document.getElementById('new-chat-name');

        const apiKey = ""; 
        
        let currentChatId = null;
        let allChats = JSON.parse(localStorage.getItem('windgpt_chats') || '{}');
        let selectedFiles = [];
        let isTyping = false;
        let defaultSystemPrompt = "Sen WindGPT'sin. SkyWind Alliance'ın merkezi zekasısın. Samimi konuşursun ama ciddiyetini bozmazsın. Lider Hüseyin'e (Levxys) sadıksın. Emojileri anlamlı kullanırsın. Kod yazarken temiz ve modern standartlarda yazarsın.";

        // --- BAŞLANGIÇ ---
        window.onload = () => {
            const savedPrompt = localStorage.getItem('windgpt_system_prompt');
            systemInput.value = savedPrompt || defaultSystemPrompt;

            if (Object.keys(allChats).length > 0) {
                const lastChat = Object.keys(allChats).sort().reverse()[0];
                loadChat(lastChat);
            } else {
                createNewChat();
            }
            loadHistory();
        };

        // --- UI UTILS ---
        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function saveSystemInstruction() {
            localStorage.setItem('windgpt_system_prompt', systemInput.value);
            toggleModal('instruction-modal');
            showNotification("Sistem senkronizasyonu tamamlandı. 🌪️");
        }

        function showNotification(msg) {
            const div = document.createElement('div');
            div.className = "fixed top-4 left-1/2 -translate-x-1/2 bg-sky-500 text-white px-6 py-3 rounded-2xl shadow-2xl z-[200] font-bold text-sm animate-bounce";
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // --- GEÇMİŞ VE YÖNETİM ---
        function loadHistory() {
            historyList.innerHTML = '';
            const sortedIds = Object.keys(allChats).sort().reverse();
            
            sortedIds.forEach(id => {
                const chat = allChats[id];
                const div = document.createElement('div');
                div.className = `history-item group p-3 text-xs rounded-xl mb-1 flex justify-between items-center transition-all ${id === currentChatId ? 'active' : 'opacity-60 hover:opacity-100 hover:bg-white/5'}`;
                
                div.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 min-w-0" onclick="loadChat('${id}')">
                        <i class="fas fa-comment-alt text-sky-500"></i>
                        <span class="truncate font-medium">${chat.title || 'Yeni Vizyon'}</span>
                    </div>
                    <div class="hidden group-hover:flex items-center gap-2 ml-2">
                        <button onclick="openRename('${id}')" class="text-gray-500 hover:text-sky-500"><i class="fas fa-pen"></i></button>
                        <button onclick="deleteChat('${id}')" class="text-gray-500 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                historyList.appendChild(div);
            });
        }

        function createNewChat() {
            currentChatId = Date.now().toString();
            allChats[currentChatId] = { title: "Yeni Vizyon", messages: [] };
            saveChats();
            loadChat(currentChatId);
        }

        function loadChat(id) {
            currentChatId = id;
            chatBox.innerHTML = '';
            const chat = allChats[id];
            if (!chat || chat.messages.length === 0) showWelcome();
            else {
                chat.messages.forEach(m => addMessage(m.text, m.role, m.images, false, false));
            }
            loadHistory();
        }

        function deleteChat(id) {
            if (confirm("Bu vizyonu sonsuza dek siliyoruz aga, emin misin? 🛡️")) {
                delete allChats[id];
                saveChats();
                if (currentChatId === id) {
                    const keys = Object.keys(allChats);
                    if (keys.length > 0) loadChat(keys[0]);
                    else createNewChat();
                } else {
                    loadHistory();
                }
            }
        }

        let renameId = null;
        function openRename(id) {
            renameId = id;
            renameInput.value = allChats[id].title;
            toggleModal('rename-modal');
        }

        function confirmRename() {
            if (renameId && renameInput.value.trim()) {
                allChats[renameId].title = renameInput.value.trim();
                saveChats();
                loadHistory();
                toggleModal('rename-modal');
            }
        }

        function saveChats() {
            localStorage.setItem('windgpt_chats', JSON.stringify(allChats));
        }

        function showWelcome() {
            chatBox.innerHTML = `
                <div id="welcome-screen" class="max-w-2xl mx-auto text-center mt-20">
                    <div class="w-24 h-24 bg-sky-500 rounded-[2rem] flex items-center justify-center text-white mx-auto mb-8 shadow-2xl animate-pulse">
                        <i class="fas fa-wind text-5xl"></i>
                    </div>
                    <h2 class="text-3xl font-bold mb-4">Selam Lider Hüseyin.</h2>
                    <p class="text-gray-500 italic">SkyWind vizyonu seninle. Borcumuzu tahsil etmeye hazırız. 🛡️</p>
                </div>
            `;
        }

        // --- GÖRSEL YÜKLEME ---
        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedFiles.push({ name: file.name, type: file.type, data: event.target.result });
                    renderPreview();
                };
                reader.readAsDataURL(file);
            });
        };

        function renderPreview() {
            imagePreview.innerHTML = '';
            if (selectedFiles.length > 0) {
                imagePreview.classList.remove('hidden');
                selectedFiles.forEach((file, index) => {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    div.innerHTML = `
                        <img src="${file.data}">
                        <div class="remove-img" onclick="removeFile(${index})">×</div>
                    `;
                    imagePreview.appendChild(div);
                });
            } else {
                imagePreview.classList.add('hidden');
            }
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderPreview();
        }

        // --- GÖRSEL OLUŞTURMA (IMAGEN 4.0) ---
        async function generateImageFromPrompt() {
            const prompt = userInput.value.trim();
            if (!prompt) {
                showNotification("Aga önce ne hayal ettiğini yazmalısın! ✨");
                return;
            }

            userInput.value = '';
            addMessage(prompt, 'user');
            setLoading(true, "Görsel İnşa Ediliyor...");

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    })
                });

                if (!response.ok) throw new Error("Görsel motoru rüzgarı kesti.");
                const data = await response.json();
                const base64 = data.predictions[0].bytesBase64Encoded;
                const imgUrl = `data:image/png;base64,${base64}`;

                addMessage("Hayalin gerçeğe dönüştü Lider. 🛡️", 'assistant', [{data: imgUrl}]);
                allChats[currentChatId].messages.push({ role: 'assistant', text: "Hayalin gerçeğe dönüştü Lider. 🛡️", images: [{data: imgUrl}] });
                saveChats();
            } catch (err) {
                addMessage(`Görsel Hatası: ${err.message}`, 'system');
            } finally {
                setLoading(false);
            }
        }

        // --- MESAJLAŞMA VE OTOMATİK İSİMLENDİRME ---
        async function sendMessage() {
            if (isTyping) return;
            const text = userInput.value.trim();
            if (!text && selectedFiles.length === 0) return;

            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.remove();

            const currentImages = [...selectedFiles];
            addMessage(text, 'user', currentImages);
            allChats[currentChatId].messages.push({ role: 'user', text, images: currentImages });
            
            userInput.value = '';
            selectedFiles = [];
            renderPreview();
            
            const isVisualAnalysis = currentImages.length > 0;
            setLoading(true, isVisualAnalysis ? "Görsel Analiz Ediliyor..." : "Düşünülüyor...");

            try {
                const contents = [];
                const finalSystemPrompt = systemInput.value || defaultSystemPrompt;

                allChats[currentChatId].messages.forEach(m => {
                    const parts = [{ text: m.text || "Bu görseli analiz et." }];
                    if (m.images && m.images.length > 0) {
                        m.images.forEach(img => {
                            parts.push({ inlineData: { mimeType: img.type || "image/png", data: img.data.split(',')[1] } });
                        });
                    }
                    contents.push({ role: m.role === 'user' ? 'user' : 'model', parts });
                });

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: finalSystemPrompt }] },
                        contents: contents
                    })
                });

                if (!response.ok) throw new Error("API Limiti veya Bağlantı Hatası.");
                const data = await response.json();
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "Bağlantı koptu aga.";

                setLoading(false);
                await addMessage(aiResponse, 'assistant', [], true, true);
                
                allChats[currentChatId].messages.push({ role: 'assistant', text: aiResponse });

                // Otomatik Başlık Belirleme (Sadece ilk mesajda)
                if (allChats[currentChatId].messages.length <= 2) {
                    generateAutoTitle(text, aiResponse);
                }

                saveChats();
            } catch (err) {
                setLoading(false);
                addMessage(`Sistem Hatası: ${err.message}`, 'system');
            }
        }

        async function generateAutoTitle(userMsg, aiMsg) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Aşağıdaki konuşma için çok kısa (max 3 kelime) bir başlık öner. Sadece başlığı yaz. \nSoru: ${userMsg}\nYanıt: ${aiMsg}` }] }]
                    })
                });
                const data = await response.json();
                const title = data.candidates?.[0]?.content?.parts?.[0]?.text || "Yeni Vizyon";
                allChats[currentChatId].title = title.replace(/"/g, '').trim();
                saveChats();
                loadHistory();
            } catch (e) { console.error("Title error", e); }
        }

        async function addMessage(text, role, images = [], scroll = true, animate = false) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-bubble`;
            
            let contentHtml = '';
            if (images && images.length > 0) {
                contentHtml += `<div class="flex flex-wrap gap-2 mb-3">`;
                images.forEach(img => contentHtml += `<img src="${img.data}" class="max-w-[280px] rounded-2xl border border-sky-500/20 shadow-xl">`);
                contentHtml += `</div>`;
            }

            const messageWrapper = document.createElement('div');
            messageWrapper.className = `max-w-[85%] p-5 shadow-lg ${role === 'user' ? 'bg-sky-500 text-white rounded-2xl rounded-tr-none' : 'bg-[var(--bg-secondary)] border border-[var(--border)] rounded-2xl rounded-tl-none'}`;
            
            div.appendChild(messageWrapper);
            chatBox.appendChild(div);
            
            if (role === 'system') {
                messageWrapper.className += ' text-red-500 bg-red-500/10 border-red-500/20';
            }

            if (animate && role === 'assistant') {
                isTyping = true;
                const words = text.split(' ');
                let currentText = '';
                for (const word of words) {
                    currentText += word + ' ';
                    messageWrapper.innerHTML = contentHtml + formatText(currentText);
                    chatBox.scrollTop = chatBox.scrollHeight;
                    await new Promise(r => setTimeout(r, 40));
                }
                isTyping = false;
            } else {
                messageWrapper.innerHTML = contentHtml + formatText(text);
            }

            if (scroll) chatBox.scrollTop = chatBox.scrollHeight;
        }

        function formatText(text) {
            // Kod Bloğu İşleme
            let html = text.replace(/```(\w+)?([\s\S]*?)```/g, (match, lang, code) => {
                return `
                    <pre><div class="code-lang">${lang || 'code'}</div><code>${code.trim()}</code></pre>
                `;
            });
            
            // Kalın Yazı ve Satır Atlamaları
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
            
            return `<div class="text-sm md:text-base leading-relaxed">${html}</div>`;
        }

        function setLoading(isLoading, statusText = "Düşünülüyor...") {
            sendBtn.disabled = isLoading;
            const icon = document.getElementById('send-icon');
            if (isLoading) {
                icon.className = "fas fa-circle-notch fa-spin";
                const typing = document.createElement('div');
                typing.id = 'loading-indicator';
                typing.className = 'flex items-center gap-3 p-4 bg-[var(--bg-secondary)] rounded-2xl w-fit border border-[var(--border)]';
                typing.innerHTML = `
                    <div class="spinner"></div>
                    <span class="text-xs font-bold text-sky-500 uppercase tracking-widest">${statusText}</span>
                `;
                chatBox.appendChild(typing);
                chatBox.scrollTop = chatBox.scrollHeight;
            } else {
                icon.className = "fas fa-paper-plane";
                const loader = document.getElementById('loading-indicator');
                if (loader) loader.remove();
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            document.getElementById('theme-text').innerText = isDark ? 'Aydınlık Mod' : 'Karanlık Mod';
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        sendBtn.onclick = sendMessage;
    </script>
</body>
</html>
